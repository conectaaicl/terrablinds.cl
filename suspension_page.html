<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servicio Suspendido — ConectaAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #070b12;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .glow-1 {
      position: fixed; top: -120px; right: -120px;
      width: 480px; height: 480px; border-radius: 50%;
      background: radial-gradient(circle, rgba(220,38,38,.22) 0%, transparent 70%);
      pointer-events: none;
    }
    .glow-2 {
      position: fixed; bottom: -100px; left: -100px;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      position: relative;
      background: linear-gradient(145deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 520px;
      width: 90%;
      backdrop-filter: blur(12px);
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
      text-align: center;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .logo-wrap img {
      height: 36px;
      width: auto;
      filter: brightness(1.1);
    }
    .logo-text {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.4px;
    }
    .logo-text span { color: #6366f1; }
    .icon-wrap {
      width: 72px; height: 72px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, rgba(220,38,38,.25), rgba(239,68,68,.1));
      border: 1px solid rgba(220,38,38,.3);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(220,38,38,.15);
      border: 1px solid rgba(220,38,38,.3);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 11px;
      font-weight: 700;
      color: #f87171;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 6px #ef4444;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .4; }
    }
    h1 {
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: -.5px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .domain-tag {
      display: inline-block;
      background: rgba(99,102,241,.12);
      border: 1px solid rgba(99,102,241,.25);
      border-radius: 8px;
      padding: 3px 12px;
      font-family: monospace;
      font-size: 13px;
      color: #a5b4fc;
      margin-bottom: 32px;
    }
    .divider {
      height: 1px;
      background: rgba(255,255,255,.06);
      margin: 28px 0;
    }
    .contact-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #475569;
      margin-bottom: 16px;
    }
    .contact-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 700;
      transition: all .2s;
    }
    .btn-wa {
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff;
      box-shadow: 0 4px 20px rgba(22,163,74,.3);
    }
    .btn-wa:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(22,163,74,.4); }
    .btn-email {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: #cbd5e1;
    }
    .btn-email:hover { background: rgba(255,255,255,.08); color: #fff; }
    .btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #334155;
    }
    .footer a { color: #4f46e5; text-decoration: none; }
  </style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="card">
    <div class="logo-wrap">
      <img src="https://clientes.conectaai.cl/logo.png" alt="ConectaAI"
           onerror="this.style.display='none'">
      <span class="logo-text">Conecta<span>AI</span></span>
    </div>

    <div class="icon-wrap">🔒</div>
    <div class="badge">Servicio Suspendido</div>

    <h1>Este sitio está suspendido</h1>
    <p class="subtitle">
      El servicio de este dominio ha sido pausado por falta de pago.
      Para reactivarlo, comunícate con nosotros.
    </p>

    <div class="domain-tag">{{DOMAIN}}</div>

    <div class="divider"></div>

    <p class="contact-label">Contactar para reactivar</p>

    <div class="contact-grid">
      <a href="https://wa.me/56998101891?text=Hola%2C%20quiero%20reactivar%20el%20sitio%20{{DOMAIN}}"
         target="_blank" class="btn btn-wa">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.890-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
        </svg>
        Escribir por WhatsApp
      </a>
      <a href="mailto:soporte@conectaai.cl?subject=Reactivar%20sitio%20{{DOMAIN}}"
         class="btn btn-email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        soporte@conectaai.cl
      </a>
    </div>

    <div class="footer">
      Servicio provisto por <a href="https://conectaai.cl" target="_blank">ConectaAI</a>
    </div>
  </div>
</body>
</html>
